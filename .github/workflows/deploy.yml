name: Frontend CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push l'image frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest

      - name: Déployer sur le Front
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FRONT_HOST: ${{ secrets.FRONT_HOST }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          FRONT_SG_ID: sg-0b1530406008e8eb0
        run: |
          # Le SG du Front n'autorise en permanence le SSH que depuis l'IP
          # admin (voir infra/terraform). Les runners GitHub Actions ont une
          # IP différente à chaque run : on l'ajoute temporairement le temps
          # du déploiement, puis on la retire (trap = même en cas d'échec).
          RUNNER_IP=$(curl -s https://api.ipify.org)
          aws ec2 authorize-security-group-ingress \
            --group-id "$FRONT_SG_ID" --protocol tcp --port 22 --cidr "${RUNNER_IP}/32"
          trap 'aws ec2 revoke-security-group-ingress --group-id "$FRONT_SG_ID" --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" || true' EXIT

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "ubuntu@$FRONT_HOST" \
            "IMAGE='$IMAGE' bash -s" <<'SCRIPT'
            set -e
            CONTAINER=app_front
            PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || true)

            docker pull "$IMAGE"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true
            docker run -d --name "$CONTAINER" --restart unless-stopped \
              -p 8080:80 "$IMAGE"

            sleep 3
            if ! curl -fs http://localhost:8080 >/dev/null; then
              echo "Health check KO, rollback vers $PREV_IMAGE"
              docker stop "$CONTAINER" 2>/dev/null || true
              docker rm "$CONTAINER" 2>/dev/null || true
              if [ -n "$PREV_IMAGE" ]; then
                docker run -d --name "$CONTAINER" --restart unless-stopped -p 8080:80 "$PREV_IMAGE"
              fi
              exit 1
            fi
            echo "Déploiement frontend OK"
          SCRIPT
